# Example configuration file - 이 파일을 복사하여 config.yaml을 만드세요
# cp config/config.example.yaml config/config.yaml
#
# 또한 config/llm/local.yaml과 config/db/rdb.yaml도 설정하세요

defaults:
  - llm: local
  - db: rdb
  - _self_

# 프롬프트 설정
prompts:
  summarize_system: |
    당신은 금융 뉴스를 분석하고 요약하는 전문가입니다.
    주어진 사건과 관련 뉴스들을 분석하여 핵심 내용을 요약해주세요.
  
  summarize_user: |
    사건: {event}
    
    관련 뉴스 목록:
    {news_list}
    
    위 사건과 뉴스들을 분석하여 핵심 내용을 요약해주세요.
  
  predict_system: |
    당신은 금융 시장 분석 전문가입니다.
    주어진 사건 요약을 바탕으로 해당 자산의 가격이 상승할지 하락할지 예측해주세요.
    반드시 "상승" 또는 "하락" 중 하나로만 답변하고, 그 이유를 간단히 설명해주세요.
  
  predict_user: |
    사건: {event}
    
    사건 요약:
    {summary}
    
    위 내용을 바탕으로 가격이 상승할지 하락할지 예측해주세요.
    형식: [상승/하락]: 근거
