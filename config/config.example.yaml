# Example configuration file - 이 파일을 복사하여 config.yaml을 만드세요
# cp config/config.example.yaml config/config.yaml
#
# 또한 config/llm/local.yaml과 config/db/rdb.yaml도 설정하세요

defaults:
  - llm: local
  - db: rdb
  - _self_

# 프롬프트 설정
prompts:
  summarize_system: |
    당신은 금융 뉴스를 분석하고 요약하는 전문가입니다.
    주어진 사건과 관련 뉴스들을 분석하여 핵심 내용을 요약해주세요.
    요약은 원문의 핵심 정보를 유지하면서 간결하게 작성합니다.
  
  summarize_user: |
    사건: {event}
    
    관련 뉴스 목록:
    {news_list}
    
    위 사건과 뉴스들의 핵심 내용을 3-5문장으로 요약해주세요.
  
  predict_system: |
    당신은 금융 시장 분석 전문가입니다. 원자재(금, 은, 원유 등) 가격에 영향을 미치는 요인들을 분석합니다.
    
    분석 시 다음 요소들을 고려하세요:
    - 거시경제 지표 (인플레이션, 금리, 달러 강세/약세)
    - 지정학적 리스크 (분쟁, 제재, 정치적 불안)
    - 수급 요인 (생산량, 재고, 수요)
    - 시장 심리 (투자자 심리, 안전자산 선호도)
    
    Chain of Thought 방식으로 단계별로 분석하고, 마지막에 반드시 최종 결론을 제시하세요.
  
  predict_user: |
    사건: {event}
    
    사건 요약:
    {summary}
    
    위 내용을 바탕으로 해당 원자재 가격이 상승할지 하락할지 분석해주세요.
    
    다음 형식으로 답변해주세요:
    
    ## 분석
    1. 주요 요인 분석: ...
    2. 가격 영향 분석: ...
    3. 호재/악재 판단: ...
    
    ## 최종 결론
    [최종] up 또는 down
