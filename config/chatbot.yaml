defaults:
  - llm: gemini  # Default to local, user can override to 'openai'
  - _self_

data:
  dir_path: "/Users/yejoon/Documents/ai tech/tilda_data/data/prices" # Correct absolute path or relative
  event_result_path: "/Users/yejoon/Documents/ai tech/tilda_data/data/events"

# Langfuse Prompts
prompts:
  system_prompt: "financial_market_analysis"

# Business Logic Constraints
limits:
  max_days_range: 3650
  token_warning_threshold: 15000
  max_price_rows: 60
  max_event_count: 20
  volatility_threshold: 0.02

# System Metadata (for prompt injection)
system:
  data_range:
    start: "2017-01-01"
    end: "2025-12-31"