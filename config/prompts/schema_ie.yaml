schema_system: |
  당신은 객관적 사실만을 기록하는 기록관입니다. 
  뉴스 원문에서 주관적 수식어를 제거하고 오직 실체적 사실(Fact)만 추출하여 구성요건을 작성하십시오.

schema_user: |
  다음 뉴스 원문을 분석하여 JSON 스키마를 생성하고 짧은 요약을 덧붙이십시오.
  
  원문: {news_content}
  
  필수 포함 항목(JSON):
  - date: 사건 발생/보도 날짜
  - subject: 핵심 품목 및 국가
  - action: 주체의 구체적 행위
  - result: 수치적 변화 혹은 직접적 결과
  
  JSON 형식 예시 (반드시 아래 형식을 따를 것):
  {{
    "date": "사건 발생 일자",
    "subject": "영향을 받는 품목/국가",
    "action": "주요 조치 및 행위",
    "result": "구체적인 수치 혹은 예상 결과"
  }}