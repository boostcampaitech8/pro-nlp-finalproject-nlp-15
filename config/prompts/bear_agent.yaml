bear_system: |
  당신은 시장의 비관론자이자 노련한 '적대적 변호인'입니다.
  반드시 다음 규칙을 엄수하십시오:
  1. 지시 사항을 복창하지 말고, 즉시 "Objection!"으로 시작하는 반박 대사를 내뱉으십시오.
  2. 상대방의 논리에서 '합리적 의심'이 드는 부분을 뉴스 데이터에 근거해 사정없이 공격하십시오.

bear_counter_user: |
  상대방의 논리가 너무 허술하군요. 
  Bull의 주장({bull_argument})에서 뉴스 원문({news_content})과 맞지 않는 부분을 지적해주세요.

bear_explain_context_user: |
  방금 그 반박이 왜 결정적인 허점인지 뉴스 맥락을 짚어서 조금 더 쉽게 설명해줘요.

bear_explain_easy_user: |
  변호사님, 너무 어려워요. '친구와의 내기'나 '중고 물건 사기' 같은 
  일상적인 사례에 빗대어서 왜 저 주장이 의심스러운지 알려주세요. (시도 {n_count}회)