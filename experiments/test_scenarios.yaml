scenarios:
  - name: "S1: 옥수수 특정 기간 요약 (단순 질문)"
    # 중점: 현재 보고 있는 기간의 수치를 정확히 짚어내는지 확인
    asset: "ZC"
    query: "지금 이 기간에 옥수수 가격 흐름 좀 요약해줄래? 중요한 수치들 위주로 알려줘."
    start_date: "2020-12-25"
    end_date: "2021-09-24"
    expected_tool: ["get_period_overview"]

  - name: "S2: 금 장기 상승 원인 (추세 분석)"
    # 중점: 날짜 언급 없이도 '기간 내' 장기 추세를 인과관계로 풀어내는지 확인
    asset: "GC"
    query: "금이 이 시기에 왜 이렇게 계속 오른 거야? 단계별로 이유가 궁금해."
    start_date: "2017-11-01"
    end_date: "2026-01-31"
    expected_tool: ["get_period_overview", "search_knowledge_base"]

  - name: "S3: 코로나 영향 분석 (사건 중심)"
    # 중점: 특정 사건(코로나)을 내부 DB에서 검색해 기간과 매칭하는지 확인
    asset: "ZC"
    query: "당시에 코로나 터지고 나서 옥수수 시장은 어땠어? 영향이 컸나?"
    start_date: "2020-01-01"
    end_date: "2022-12-31"
    expected_tool: ["search_events_by_keyword", "get_period_overview"]

  - name: "S4: 전쟁 영향 종합 분석 (복합 분석)"
    # 중점: 여러 툴을 조합해 지정학적 리스크를 심층 분석하는지 확인
    asset: "ZC"
    query: "우크라이나 전쟁 때문에 옥수수 값 난리 났던 거 정리 좀 해줘. 공급 문제는 어땠어?"
    start_date: "2022-02-24"
    end_date: "2026-01-31"
    expected_tool: ["search_events_by_keyword", "search_knowledge_base", "get_period_overview"]

  - name: "S5: 미래 가격 예측 (거절 가이드라인)"
    # 중점: 2030년이라는 범위 밖 질문에 대해 툴 남발 없이 '예측 불가' 원칙을 지키는지 확인
    asset: "ZC"
    query: "지금 흐름 보니까 장난 아니네. 2030년쯤 되면 옥수수 가격이 얼마나 가 있을까?"
    start_date: "2026-02-01"
    end_date: "2030-12-31"
    expected_tool: []

  - name: "S6: 금과 구리 비교 (순차 조회)"
    # 중점: 두 자산 비교 시 툴을 각각 따로 호출해서 데이터를 가져오는지 확인
    asset: "GC"
    query: "이 기간에 금이랑 구리 중에 뭐가 더 많이 올랐어? 왜 차이가 난 거야?"
    start_date: "2021-01-01"
    end_date: "2026-01-31"
    expected_tool: ["get_period_overview", "get_period_overview"]

  - name: "S7: 지엽적 이슈 보완 (Web Search)"
    # 중점: 내부 데이터에 없을 법한 구체적 정책 질문 시 Web Search로 넘어가는지 확인
    asset: "ZC"
    query: "이때 아이오와 쪽에서 옥수수 에탄올 섞는 비율 가지고 말 많지 않았나? 구체적으로 어땠지?"
    start_date: "2021-01-01"
    end_date: "2021-12-31"
    expected_tool: ["get_period_overview", "web_search"]

  - name: "S8: 뉴스 링크 기반 분석 (URL 추출)"
    # 중점: 링크가 주어졌을 때 검색 대신 URL 추출 툴을 우선 사용하는지 확인
    asset: "ZC"
    query: "이 기사(https://www.dailysignal.com/2017/11/15/nine-ideas-for-nafta-negotiators/) 보고, 여기서 말하는 내용들이 옥수수 수출에 어떤 변수가 될지 분석해줘."
    start_date: "2017-01-01"
    end_date: "2018-12-31"
    expected_tool: ["extract_url_content", "get_period_overview", "search_knowledge_base"]